<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Frontend Mentor NFT Preview Card solution built with semantic HTML and CSS. 
        Responsive design featuring Flexbox, Grid and fluid typography.">
    <title>Huddle Landing Page With A Single Introductory Section | Frontend Mentor</title>
    <!-- CSS STYLES -->
    <link rel="stylesheet" href="./styles.css">
    <!-- ICON -->
    <link rel="icon" href="images/favicon-32x32.png" sizes="32x32" type="image/png"/>
    <!-- FONTS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
    <!-- GOOGLE FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400&display=swap" rel="stylesheet">
</head>
<body>
    <!-- MAIN CONTAINER -->
   <main class="container">

    <!-- HEADER -->
    <header class="logo-header">
        <img src="./images/logo.svg" alt="Huddle logo" class="logo">
    </header>

    <!-- MOCKUP SECTION -->
    <section class="mockups-section">
        <img src="./images/illustration-mockups.svg" alt="Huddle mockups" class="mockups">
    </section>

    <!-- CONTENT -->
    <section class="content">
        <h1 class="content-title">Build The Community Your Fans Will Love</h1>
        <p class="content-descpt">Huddle re-imagines the way we build communities. You have a voice, but so does your audience. 
            Create connections with your users as you engage in genuine discussion.</p>
        <a href="#" class="register-btn">Register</a>
    </section>

    <!-- SOCIAL ICONS -->
    <section class="social-icons">
        <a href="#" aria-label="Facebook">
            <i class="fa-brands fa-facebook-f"></i>
        </a>
        <a href="#" aria-label="Twitter">
            <i class="fa-brands fa-twitter"></i>
        </a>
        <a href="#" aria-label="Instagram">
            <i class="fa-brands fa-instagram"></i>
        </a>
    </section>
   </main>

   <!-- FOOTER -->
   <footer>
        <p>Challenge by <a href="https://www.frontendmentor.io/challenges/huddle-landing-page-with-a-single-introductory-section-B_2Wvxgi0" target="_blank" rel="noopener noreferrer">Frontend Mentor</a>. 
            Coded by <a href="https://github.com/codecove01-netizen/Huddle-Landing-Page-With-A-Single-Introductory-Section" target="_blank" rel="noopener noreferrer">Arati D'sa.</a> </p>
   </footer>    
</body>
</html>
